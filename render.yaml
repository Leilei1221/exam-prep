services:
  - type: web
    name: exam-prep
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: exam-prep-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: exam-prep-db
    databaseName: exam_prep
    plan: free
